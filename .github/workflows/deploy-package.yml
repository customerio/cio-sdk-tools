name: Deploy SDK

# Testing configuration - triggers on pull requests
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: write # access to push the git tag
  issues: write # Bot creates an issue if there is an issue during deployment process
  pull-requests: write # allow bot to make comments on PRs after they get deployed

jobs:
  deploy-npm:
    name: Deploy to npm
    environment: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm 11.5.1+ for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Publish to npm
        run: |
          npm version 0.0.0-test-oidc
          npm publish --dry-run --tag test-oidc
