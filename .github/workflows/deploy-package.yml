name: Deploy SDK

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      tagToDeploy:
        description: 'Type name of existing git tag (example: 1.0.3) to push to npm'
        required: false
        type: string

permissions:
  id-token: write
  contents: write # access to push the git tag
  issues: write # Bot creates an issue if there is an issue during deployment process
  pull-requests: write # allow bot to make comments on PRs after they get deployed

jobs:
  deploy-npm:
    name: Deploy to npm
    environment: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.tagToDeploy || github.ref) || github.head_ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm 11.5.1+ for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Publish to npm
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            npm version 0.0.0-test-oidc-manual --no-git-tag-version
          else
            npm version 0.0.0-test-oidc --no-git-tag-version
          fi
          npm publish --dry-run --tag test-oidc
